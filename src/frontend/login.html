<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Islamabad Real Estate Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Islamabad Real Estate Management System <span class="text-gold">.</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="register.html" class="btn btn-outline">Register</a>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="auth-container">
        <div class="auth-card">
            <h2>Sign In to Your Account</h2>
            <form action="dashboard-buyer.html">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; font-size: 14px;">
                    <label style="display: flex; align-items: center; gap: 5px; margin: 0; font-weight: normal;">
                        <input type="checkbox"> Remember Me
                    </label>
                    <a href="#" class="text-gold">Forgot Password?</a>
                </div>
                
                <!-- Mock Login Simulator Dropdown for presentation -->
                <div class="form-group" style="margin-top: 20px;">
                    <label>Select Role (For Demo Purposes)</label>
                    <select class="form-control" onchange="this.form.action = this.value">
                        <option value="dashboard-buyer.html">Buyer / Tenant</option>
                        <option value="dashboard-agent.html">Real Estate Agent</option>
                        <option value="dashboard-authority.html">City Authority</option>
                        <option value="dashboard-admin.html">System Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted);">
                Don't have an account? <a href="register.html" class="text-gold" style="font-weight: 600;">Register Here</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="border: none; padding-top: 0;">
                &copy; 2026 Islamabad Real Estate Management System.
            </div>
        </div>
    </footer>
</body>
</html>
