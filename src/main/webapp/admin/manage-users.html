<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage User Accounts - IRMS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar" style="padding: 15px 0;">
        <div class="container" style="max-width: 100%; padding: 0 40px;">
            <a href="../index.html" class="logo">Islamabad Real Estate Management System <span class="text-gold">.</span></a>
            <div class="nav-links">
                <span class="text-light">System Administrator</span>
                <a href="../index.html" class="btn btn-outline" style="padding: 8px 15px;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <div class="sidebar">
            <div class="sidebar-menu">
                <a href="../index.html">System Health</a>
                <a href="admin-manage-users.html" class="active">User Management</a>
                <a href="#">Database Backups</a>
                <a href="#">Security Logs</a>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h2>Manage User Accounts</h2>
                <button class="btn btn-primary" id="addUserBtn">+ Add New User</button>
            </div>

            <div class="search-container" style="margin-bottom: 20px; max-width: 500px;">
                <input type="text" id="userSearch" placeholder="Search users by name, email, or ID...">
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for User Edit/Create -->
    <div id="userModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000;">
        <div class="modal-content" style="background:#fff; margin:10% auto; padding:20px; width:50%; border-radius:5px;">
            <h3 id="modalTitle">Manage User</h3>
            <form id="userForm">
                <div style="margin-bottom: 15px;">
                    <label>Name</label>
                    <input type="text" id="userName" style="width:100%; padding:8px; margin-top:5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Email</label>
                    <input type="email" id="userEmail" style="width:100%; padding:8px; margin-top:5px;" required>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Role</label>
                    <select id="userRole" style="width:100%; padding:8px; margin-top:5px;">
                        <option value="Buyer">Buyer</option>
                        <option value="Agent">Agent</option>
                        <option value="Authority">Authority</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Status</label>
                    <select id="userStatus" style="width:100%; padding:8px; margin-top:5px;">
                        <option value="Active">Active</option>
                        <option value="Suspended">Suspended</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <button type="button" class="btn btn-outline" id="closeModalBtn">Cancel</button>
            </form>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/admin-users.js"></script>
</body>
</html>
