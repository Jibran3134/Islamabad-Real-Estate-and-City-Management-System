<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Listings - Agent</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-off-white">
    <nav class="navbar" style="padding: 15px 0;">
        <div class="container" style="max-width: 100%; padding: 0 40px;">
            <a href="../index.html" class="logo">Islamabad Real Estate Management System <span class="text-gold">.</span></a>
            <div class="nav-links">
                <span class="text-light">Real Estate Agent</span>
                <a href="../index.html" class="btn btn-outline" style="padding: 8px 15px;">Logout</a>
            </div>
        </div>
    </nav>

    <div class="dashboard-layout">
        <div class="sidebar">
            <div class="sidebar-menu">
                <a href="../index.html">Dashboard</a>
                <a href="manage-listing.html" class="active">My Listings (UC3/UC5)</a>
                <a href="#">Bidding Offers</a>
                <a href="#">Profile</a>
            </div>
        </div>

        <div class="dashboard-content">
            <div class="dashboard-header">
                <h2>Manage Property Listings</h2>
                <button class="btn btn-primary" id="addListingBtn">+ Add New Listing (UC3)</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Title</th>
                            <th>Sector</th>
                            <th>Type</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions (UC5)</th>
                        </tr>
                    </thead>
                    <tbody id="listingsTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal for Listing Add/Edit (UC3/UC5) -->
    <div id="listingModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; overflow-y: auto;">
        <div class="modal-content" style="background:#fff; margin:5% auto; padding:20px; width:60%; border-radius:5px;">
            <h3 id="modalTitle">Add Property Listing (UC3)</h3>
            <form id="listingForm">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                    <div>
                        <label>Property Title</label>
                        <input type="text" id="propTitle" style="width:100%; padding:8px; margin-top:5px;" required>
                    </div>
                    <div>
                        <label>Sector</label>
                        <select id="propSector" style="width:100%; padding:8px; margin-top:5px;" required>
                            <option value="F-7">F-7</option>
                            <option value="F-8">F-8</option>
                            <option value="E-7">E-7</option>
                            <option value="G-11">G-11</option>
                        </select>
                    </div>
                    <div>
                        <label>Property Type</label>
                        <select id="propType" style="width:100%; padding:8px; margin-top:5px;" required>
                            <option value="House">House</option>
                            <option value="Apartment">Apartment</option>
                            <option value="Plot">Plot</option>
                            <option value="Commercial">Commercial</option>
                        </select>
                    </div>
                    <div>
                        <label>Price (Rs.)</label>
                        <input type="number" id="propPrice" style="width:100%; padding:8px; margin-top:5px;" required>
                    </div>
                    <div>
                        <label>Bedrooms</label>
                        <input type="number" id="propBeds" style="width:100%; padding:8px; margin-top:5px;">
                    </div>
                    <div>
                        <label>Bathrooms</label>
                        <input type="number" id="propBaths" style="width:100%; padding:8px; margin-top:5px;">
                    </div>
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Description</label>
                    <textarea id="propDesc" style="width:100%; padding:8px; margin-top:5px; height: 100px;"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Save Listing</button>
                <button type="button" class="btn btn-outline" id="closeModalBtn">Cancel</button>
            </form>
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/property-listing.js"></script>
</body>
</html>
