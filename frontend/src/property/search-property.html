<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Property Search - IRMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .filter-panel {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(4, 1fr) auto;
            gap: 15px;
            align-items: end;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        .filter-group label {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
            color: var(--text-dark);
        }
        .filter-group select, .filter-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .property-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .no-results {
            grid-column: span 3;
            text-align: center;
            padding: 50px;
            color: var(--text-muted);
            font-size: 18px;
            background: #fff;
            border-radius: 8px;
        }
    </style>
</head>
<body class="bg-off-white">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="logo">Islamabad Real Estate Management System <span class="text-gold">.</span></a>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="search-property.html" style="color: var(--primary-gold);">Advanced Search</a>
                <a href="../index.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <div class="container" style="padding: 40px 20px;">
        <h1 class="section-title" style="text-align: left; margin-bottom: 10px;">Find Your Dream Property</h1>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Use our advanced multi-filter logic (UC4) to search properties across Islamabad.</p>
        
        <!-- Search and Filter Bar -->
        <div class="filter-panel" id="filterForm">
            <div class="filter-group">
                <label>Keyword</label>
                <input type="text" id="searchKeyword" placeholder="e.g. Villa, Apartment...">
            </div>
            <div class="filter-group">
                <label>Sector</label>
                <select id="searchSector">
                    <option value="">All Sectors</option>
                    <option value="F-7">F-7</option>
                    <option value="F-8">F-8</option>
                    <option value="E-7">E-7</option>
                    <option value="G-11">G-11</option>
                    <option value="D-12">D-12</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Property Type</label>
                <select id="searchType">
                    <option value="">Any Type</option>
                    <option value="House">House</option>
                    <option value="Apartment">Apartment</option>
                    <option value="Commercial">Commercial</option>
                    <option value="Plot">Plot</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Max Price (Rs.)</label>
                <input type="number" id="searchMaxPrice" placeholder="No Limit">
            </div>
            <button class="btn btn-primary" id="applyFiltersBtn" style="height: 40px;">Search</button>
        </div>

        <div class="property-grid" id="searchResultsGrid">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/property-search.js"></script>
</body>
</html>
