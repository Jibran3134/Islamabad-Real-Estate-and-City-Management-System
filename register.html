<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Islamabad Real Estate Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">Islamabad Real Estate Management System <span class="text-gold">.</span></a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html" class="btn btn-outline">Login</a>
            </div>
        </div>
    </nav>

    <!-- Register Form -->
    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <h2>Create an Account</h2>
            <form action="login.html">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" placeholder="Last Name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" placeholder="Enter your phone number" required>
                </div>

                <div class="form-group">
                    <label>Account Type</label>
                    <select class="form-control" required>
                        <option value="">Select Account Type</option>
                        <option value="buyer">Buyer / Tenant</option>
                        <option value="agent">Real Estate Agent (Requires Approval)</option>
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="Create password" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" class="form-control" placeholder="Confirm password" required>
                    </div>
                </div>

                <div class="form-group" style="font-size: 14px; margin-top: 10px;">
                    <label style="display: flex; align-items: flex-start; gap: 10px; font-weight: normal; margin: 0;">
                        <input type="checkbox" required style="margin-top: 4px;"> 
                        <span>I agree to the <a href="#" class="text-gold">Terms and Conditions</a> and <a href="#" class="text-gold">Privacy Policy</a> set by the City Real Estate Authority.</span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Register Account</button>
            </form>
            <p style="text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-muted);">
                Already have an account? <a href="login.html" class="text-gold" style="font-weight: 600;">Sign In Here</a>
            </p>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom" style="border: none; padding-top: 0;">
                &copy; 2026 Islamabad Real Estate Management System.
            </div>
        </div>
    </footer>
</body>
</html>
